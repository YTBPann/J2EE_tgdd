<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý danh mục</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f5f5f5; }
        .box { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .row { display: flex; gap: 10px; }
        input { padding: 10px; flex: 1; }
        button, a.btn { padding: 10px 14px; border: none; border-radius: 6px; text-decoration: none; cursor: pointer; }
        .save { background: #d32f2f; color: white; }
        .back { background: #ddd; color: #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; }
        .edit { background: #1976d2; color: white; }
        .delete { background: #b71c1c; color: white; }
        form.inline { display: inline; }
    </style>
</head>
<body>
<div class="box">
    <h2 th:text="${category.id != null} ? 'Sửa danh mục' : 'Thêm danh mục mới'"></h2>
    <form th:action="@{/categories/save}" method="post" th:object="${category}">
        <input type="hidden" th:field="*{id}">
        <div class="row">
            <input type="text" th:field="*{name}" placeholder="Tên danh mục..." required>
            <button class="save" type="submit">💾 Lưu</button>
            <a class="btn back" href="/products">⬅ Quay lại sản phẩm</a>
        </div>
    </form>
</div>

<div class="box">
    <h3>Danh sách danh mục</h3>
    <table>
        <thead>
        <tr><th>ID</th><th>Tên</th><th>Thao tác</th></tr>
        </thead>
        <tbody>
        <tr th:if="${categories.isEmpty()}">
            <td colspan="3">Chưa có danh mục nào.</td>
        </tr>
        <tr th:each="c : ${categories}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.name}"></td>
            <td>
                <a class="btn edit" th:href="@{'/categories/edit/' + ${c.id}}">Sửa</a>
                <form class="inline" th:action="@{'/categories/delete/' + ${c.id}}" method="post">
                    <button class="delete" type="submit" onclick="return confirm('Xóa danh mục này?')">Xóa</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
