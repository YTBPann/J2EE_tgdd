<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout :: layout(~{::content})">

<div th:fragment="content">

<div class="container" style="max-width:980px;margin:30px auto;background:#fff;border-radius:10px;padding:24px;">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h1>🛒 Giỏ hàng của bạn</h1>
        <a th:href="@{/products}" style="text-decoration:none;color:#d32f2f;font-weight:700;">
            ← Tiếp tục mua hàng
        </a>
    </div>

    <div th:if="${cartItems.isEmpty()}" style="text-align:center;padding:40px 10px;color:#777;">
        <h3>Chưa có sản phẩm trong giỏ hàng</h3>
        <p>Hãy quay lại danh sách sản phẩm để thêm hàng vào giỏ.</p>
    </div>

    <div th:if="${!cartItems.isEmpty()}">

        <table style="width:100%;border-collapse:collapse;">
            <thead>
            <tr>
                <th style="padding:12px;border-bottom:1px solid #ececec;">Sản phẩm</th>
                <th style="padding:12px;border-bottom:1px solid #ececec;">Đơn giá</th>
                <th style="padding:12px;border-bottom:1px solid #ececec;">Số lượng</th>
                <th style="padding:12px;border-bottom:1px solid #ececec;">Thành tiền</th>
                <th style="padding:12px;border-bottom:1px solid #ececec;">Thao tác</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="item : ${cartItems}">
                <td th:text="${item.product.name}"></td>

                <td th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')} + '₫'"></td>

                <td th:text="${item.quantity}"></td>

                <td th:text="${#numbers.formatDecimal(item.lineTotal,0,'COMMA',0,'POINT')} + '₫'"></td>

                <td>
                    <div style="display:flex;gap:8px;">

                        <form th:action="@{'/cart/decrease/' + ${item.product.id}}" method="post">
                            <button style="background:#e5e5e5;border:none;padding:6px 10px;border-radius:4px;">-</button>
                        </form>

                        <form th:action="@{'/cart/increase/' + ${item.product.id}}" method="post">
                            <button style="background:#ffd700;border:none;padding:6px 10px;border-radius:4px;">+</button>
                        </form>

                        <form th:action="@{'/cart/remove/' + ${item.product.id}}" method="post">
                            <button style="background:#ef5350;color:white;border:none;padding:6px 10px;border-radius:4px;">
                                Xóa
                            </button>
                        </form>

                    </div>
                </td>

            </tr>

            </tbody>
        </table>

        <div style="margin-top:20px;display:flex;justify-content:space-between;align-items:center;">
            <h3>
                Tổng tiền:
                <span th:text="${#numbers.formatDecimal(grandTotal,0,'COMMA',0,'POINT')} + '₫'"></span>
            </h3>

            <form th:action="@{/cart/clear}" method="post">
                <button style="background:#333;color:white;border:none;padding:8px 12px;border-radius:5px;">
                    Xóa toàn bộ giỏ hàng
                </button>
            </form>
        </div>

    </div>

</div>

</div>
</html>
