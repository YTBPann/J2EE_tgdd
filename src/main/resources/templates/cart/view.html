<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <title>Giỏ hàng</title>
</head>

<body>

<div layout:fragment="content">

<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🛒 Giỏ hàng của bạn</h2>
        <a class="btn btn-outline-primary" th:href="@{/products}">
            ← Tiếp tục mua hàng
        </a>
    </div>

    <!-- CART EMPTY -->
    <div th:if="${cartItems.isEmpty()}" class="text-center mt-5">
        <h4>Chưa có sản phẩm trong giỏ hàng</h4>
        <p>Hãy quay lại danh sách sản phẩm để thêm vào giỏ.</p>
    </div>

    <!-- CART TABLE -->
    <div th:if="${!cartItems.isEmpty()}">

        <table class="table table-bordered align-middle">

            <thead class="table-light">
            <tr>
                <th>Sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
                <th>Thao tác</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="item : ${cartItems}">

                <td th:text="${item.product.name}"></td>

                <td th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')} + '₫'"></td>

                <td th:text="${item.quantity}"></td>

                <td th:text="${#numbers.formatDecimal(item.lineTotal,0,'COMMA',0,'POINT')} + '₫'"></td>

                <td>

                    <div class="d-flex gap-2">

                        <form th:action="@{'/cart/decrease/' + ${item.product.id}}" method="post">
                            <button class="btn btn-secondary btn-sm">-</button>
                        </form>

                        <form th:action="@{'/cart/increase/' + ${item.product.id}}" method="post">
                            <button class="btn btn-warning btn-sm">+</button>
                        </form>

                        <form th:action="@{'/cart/remove/' + ${item.product.id}}" method="post">
                            <button class="btn btn-danger btn-sm">Xóa</button>
                        </form>

                    </div>

                </td>

            </tr>

            </tbody>

        </table>

        <div class="d-flex justify-content-between align-items-center mt-4">

            <h4>
                Tổng tiền:
                <span th:text="${#numbers.formatDecimal(grandTotal,0,'COMMA',0,'POINT')} + '₫'"></span>
            </h4>

            <form th:action="@{/cart/clear}" method="post">
                <button class="btn btn-dark">
                    Xóa toàn bộ giỏ hàng
                </button>
            </form>

        </div>

    </div>

</div>

</div>

</body>
</html>
