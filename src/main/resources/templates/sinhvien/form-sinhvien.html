<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Nhập Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<section layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h2 class="text-center mb-4">Form Sinh Viên</h2>

            <form th:action="@{/sinhvien}" th:object="${sinhVien}" method="post">

                <div class="mb-3">
                    <label class="form-label">Tên</label>
                    <input type="text" class="form-control" th:field="*{ten}">
                    <div class="text-danger" th:errors="*{ten}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tuổi</label>
                    <input type="number" class="form-control" th:field="*{tuoi}">
                    <div class="text-danger" th:errors="*{tuoi}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Khoa</label>
                    <input type="text" class="form-control" th:field="*{khoa}">
                    <div class="text-danger" th:errors="*{khoa}"></div>
                </div>

                <div class="text-center">
                    <button class="btn btn-primary px-4">Submit</button>
                </div>

            </form>

        </div>
    </div>
</section>

</body>
</html>
